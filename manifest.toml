#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "koel"
name = "Koel"
description.en = "Web-based personal audio streaming service"
description.fr = "Service web de streaming audio personnel"

version = "9.8.0~ynh1"

maintainers = ["tituspijean"]

[upstream]
license = "MIT"
website = "https://koel.dev"
demo = "https://demo.koel.dev"
admindoc = "https://docs.koel.dev"
code = "https://github.com/koel/koel"
cpe = "cpe:2.3:a:koel:koel"
fund = "https://opencollective.com/koel"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "300M"
ram.build = "150M"
ram.runtime = "150M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    url = "https://github.com/koel/koel/releases/download/v9.8.0/koel-v9.8.0.tar.gz"
    sha256 = "9961635d79d9bed2b38b00918d77b0a21a72d02c7bdef9318ef0c7033f9dd3ee"

    autoupdate.strategy = "latest_github_release"
    autoupdate.asset = "^koel-v.*tar.gz$"

    [resources.system_user]
    allow_email = true

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]

    [resources.apt]
    packages = [
        "php8.4-fpm",
        "php8.4-gd",
        "php8.4-mbstring",
        "php8.4-mysql",
        "php8.4-sqlite3",
        "php8.4-xml",
        "mariadb-server",
        "ffmpeg",
    ]
    [resources.database]
    type = "mysql"
